<html>
	<head>
		<title>Quadratic Equations</title>
		<meta charset="utf-8"/>
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link rel="stylesheet" href="common.css">
		<style type="text/css">
ul, #results p {
	margin: 0.5em;
	margin-top: 0;
}
input[type=number] {
	width: 5em;
}
ul {
	list-style-type: none;
	display: table;
	padding: 0;
}
ul li:first-of-type {
	display: inline-table;
}
ul li:last-child, ul.long-zeros li:nth-last-child(2) {
	font-weight: bold;
	color: var(--color-secondary);
}
ul li:before {
	content: "\00a0=\00a0";
	white-space: pre;
}
#results {
	margin-top: 2em
}
h2 > span {
	margin-left: 10px;
	font-size: 13px;
	font-weight: initial;
	display: inline-block;
	vertical-align: bottom;
}
		</style>
	</head>
	<body>
		<h1>Quadratic Equations</h1>
		<div class="boxed">
			<p>
				<var>f</var>&nbsp;(<var>x</var>) = <var>ax</var><sup>2</sup> + <var>bx</var> + <var>c</var>
			</p>
			<p id="equation"/>
		</div>
		<p>
			<var>a</var> = <input id="a" oninput="updateInput(this)" onblur="resetInput(this)" onchange="solve()" />
		<hr><p>
			<var>b</var> = <input id="b" oninput="updateInput(this)" onblur="resetInput(this)" onchange="solve()" />
		<hr><p>
			<var>c</var> = <input id="c" oninput="updateInput(this)" onblur="resetInput(this)" onchange="solve()" />
		<hr>
		<div id="results"></div>
		<script src="common.js"></script>
		<script>
globalThis["resetInput"] = function resetInput(input) {
	var name = input.id
	document.getElementById("warning" + name.toUpperCase())?.remove()
	input.value = simpleFracText(...globalThis[name])
}
function equation(inside) {
	var b = globalThis["b"], c = globalThis["c"]

	var s = ''

	if (a[0] != 0)
		s += fractionCoefficient(globalThis["a"], inside + "<sup>2</sup>")

	if (b[0] > 0)
		s += b[0] == 1 ? '&nbsp;+ ' + inside : '&nbsp;+ ' + fractionCoefficient(b, inside)
	else if (b[0] < 0)
		s += b[0] == -1 ? '&nbsp;&minus; ' + inside : '&nbsp;&minus; ' + fractionCoefficient([-b[0], b[1]], inside)

	if (c[0] > 0)
		s += '&nbsp;+ ' + fancyFraction(...c)
	else if (c[0] < 0)
		s += '&nbsp;&minus; ' + fancyFraction(-c[0], c[1])
	return s
}
function update() {
	document.getElementById('equation').innerHTML = `<var>f</var>&nbsp;(<var>x</var>)&nbsp;= ` + equation('<var>x</var>')
}
globalThis["updateInput"] = function(input, onFail) {
	var name = input.id
	var v = parseFraction(input.value)
	var warning = document.getElementById("warning" + name.toUpperCase())
	if (!v || (name == "a" && v[0] == 0)) {
		if (!warning) {
			warning = document.createElement("span")
			warning.id = "warning" + name.toUpperCase()
			warning.className = "warning"
			warning.innerHTML = ` Invalid value for <var>${name}</var>!`
			input.after(warning)
		}
		if (onFail)
			onFail(input)
	} else {
		globalThis[name] = v
		warning?.remove()
		update()
	}
}
globalThis["a"] = [1, 1]
globalThis["updateInput"](document.getElementById("a"), globalThis["resetInput"])
globalThis["b"] = [0, 1]
globalThis["updateInput"](document.getElementById("b"), globalThis["resetInput"])
globalThis["c"] = [0, 1]
globalThis["updateInput"](document.getElementById("c"), globalThis["resetInput"])
const quadraticFormula = fraction('-<var>b</var>&nbsp;&plusmn;&nbsp;' + sqrtText('<var>b</var><sup>2</sup>&nbsp;&minus;&nbsp;4<var>ac</var>'), '2<var>a</var>')
const nb2a = fraction("<var>b</var>", "2<var>a</var>", "&minus;")
globalThis["solve"] = function solve() {
	var a = globalThis["a"], b = globalThis["b"], c = globalThis["c"]
	var aStr = fancyFraction(...a), bStr = fancyFraction(...b)
	var results = document.getElementById("results")
	results.replaceChildren()

	// vertex
	var headingV = document.createElement("h2")
	results.appendChild(headingV)
	headingV.innerText = "Vertex"
	headingV.appendChild(document.createElement("hr"))
	var vertex1 = document.createElement("p")
	headingV.after(vertex1)
	var a2 = mulFrac(2, a), negB = negate(b)
	var negBStr = fancyFraction(...negB), a2Str = fancyFraction(...a2)
	var h = divFrac(negB, a2)
	var hStr = fancyFraction(...h), truncH = toDecimalString(h), intH = isInteger(h)
	vertex1.innerHTML = nb2a + fraction(bStr, `2(${aStr})`, ' =&nbsp;&minus;(') + ') =&nbsp;' + hStr
	if (!intH)
		vertex1.innerHTML += " =&nbsp;" + truncH
	var vertex2 = document.createElement("p")
	vertex1.after(vertex2)
	var k = addFrac(mulFrac(a, h, h), mulFrac(b, h), c)
	var kStr = fancyFraction(...k), truncK = toDecimalString(k), intK = isInteger(k)
	vertex2.innerHTML = `<var>f</var>&nbsp;(${nb2a}) =&nbsp;${equation(`(${hStr})`)} =&nbsp;` + kStr
	if (!intK)
		vertex2.innerHTML += '=&nbsp;' + truncK
	var vertex = document.createElement("p")
	vertex1.before(vertex)
	vertex.innerHTML = `The vertex is at: <b>(${hStr}, ${kStr})</b>`
	if (!intH || !intK)
		vertex.innerHTML += ` or <b>(${truncH}, ${truncK})</b>`

	// zeros
	var headingZ = document.createElement("h2")
	results.appendChild(headingZ)
	headingZ.innerText = "Zeros (roots)"
	// var note = document.createElement("span")
	// note.innerHTML = '<span class="hidden">; note: </span>results, especially fractions, may be slightly innaccurate due to floating-point errors'
	// headingZ.appendChild(note)
	headingZ.appendChild(document.createElement("hr"))
	var zeros1 = document.createElement("ul")
	headingZ.after(zeros1)
	var discriminant = subFrac(mulFrac(b, b), mulFrac(4, a, c))
	zeros1.innerHTML = '<var style="display:table-cell">x</var><span class="hidden"> =<br></span>'
	addChildList(zeros1,
		quadraticFormula,
		fraction(`-(${bStr})&nbsp;&plusmn;&nbsp;` + sqrtText(`(${bStr})<sup>2</sup>&nbsp;&minus;&nbsp;4(${aStr})(${fancyFraction(...c)})`), `2(${aStr})`))
	if (isInteger(discriminant)) {
		if (!discriminant[0]) { // if the discriminant is 0, the zero is at the vertex
			addChildList(zeros1, hStr)
			if (!intH)
				addChildList(zeros1, truncH)
		} else {
			var [[radic, coeff, imaginary], denom] = simplifySqrtFrac(...discriminant)
			addChildList(zeros1, fraction(`${negBStr}&nbsp;&plusmn;&nbsp;${sqrtText(fancyFraction(...discriminant))}`, a2Str))
			if (radic == 1 && !imaginary) { // result is rational (only one term)
				var coeffB = addFrac(negB, coeff), bCoeff = subFrac(negB, coeff)
				var reduced1 = divFrac(coeffB, a2), reduced2 = divFrac(bCoeff, a2)
				addChildList(zeros1,
					fraction(`${negBStr}&nbsp;&plusmn;&nbsp;${coeff}`, a2Str),
					connect(
						fraction(fancyFraction(...coeffB), a2Str),
						fraction(fancyFraction(...bCoeff), a2Str)
					),
					connect(
						fancyFraction(...reduced1),
						fancyFraction(...reduced2)
					))
				if (reduced1[1] != 1 || reduced2[1] != 1) {
					zeros1.classList.add("long-zeros")
					addChildList(zeros1, connect(reduced1[0] / reduced1[1], reduced2[0] / reduced2[1]))
				}
			} else {
				var a2Abs = abs(a2), a2AbsStr = fancyFraction(...a2Abs)
				var frac2 = divFrac(coeff, a2Abs), frac2Text = withImaginary(fancyFraction(...frac2), imaginary), frac2SqrtText = sqrtText(radic, frac2Text)
				var frac2Num = frac2[0] / frac2[1] * Math.sqrt(radic)
				addChildList(zeros1, fraction(`${negBStr}&nbsp;&plusmn;&nbsp;${sqrtText(radic, withImaginary(coeff, imaginary))}`, a2Str))
				if (b[0]) {
					zeros1.classList.add("long-zeros")
					var frac1 = divFrac(negB, a2Abs), frac1Text = fancyFraction(...frac1), frac1Num = (negB[0] * a2Abs[1]) / (negB[1] * a2Abs[0])
					addChildList(zeros1,
						connect(`${frac1Text} + ${frac2SqrtText}`, `${frac1Text} &minus; ${frac2SqrtText}`),
						imaginary ? connect(`${frac1Num} + ${withImaginary(frac2Num, true)}`, `${frac1Num} &minus; ${withImaginary(frac2Num, true)}`) :
								connect(frac1Num + frac2Num, frac1Num - frac2Num)
					)
				} else { // b is 0, so we omit the first fraction
					addChildList(zeros1, connect(frac2SqrtText, sqrtText(radic, `&minus;${frac2Text}`)))
					if (frac2[1] != 1 || radic != 1) {
						zeros1.classList.add("long-zeros")
						addChildList(zeros1, connect(withImaginary(-frac2Num, imaginary), withImaginary(frac2Num, imaginary)))
					}
				}
			}
		}
	} else {
		zeros1.classList.add("long-zeros")
		var [[radic, coeff, i], denom] = simplifySqrtFrac(...discriminant)
		addChildList(zeros1, fraction(`${negBStr}&nbsp;&plusmn;&nbsp;${sqrtText(fancyFraction(...discriminant))}`, a2Str))
		var rightFrac = divFrac([coeff, denom], a2), rightFracNum = (rightFrac[0] * Math.sqrt(radic)) / rightFrac[1]
		if (b[0]) {
			addChildList(zeros1, fraction(negBStr + '&nbsp;&plusmn;&nbsp;' + sqrtFracString(radic, coeff, i, denom), a2Str))
			coeff = rightFrac[0]
			denom = rightFrac[1]
			var newNegB = divFrac(negB, a2)
			var newNegBNum = newNegB[0] / newNegB[1]
			addChildList(zeros1,
				fancyFraction(...newNegB) + '&nbsp;&plusmn;&nbsp;' + sqrtFracString(radic, rightFrac[0], i, rightFrac[1]),
				i ? connect(newNegBNum + " + " + withImaginary(Math.abs(rightFracNum), true), newNegBNum + " &minus; " + withImaginary(Math.abs(rightFracNum), true)) :
					connect(newNegBNum + rightFracNum, newNegBNum - rightFracNum)
			)
		} else {
			addChildList(zeros1, fraction("&plusmn;" + sqrtFracString(radic, coeff, i, denom), a2Str))
			addChildList(zeros1,
				"&plusmn;" + sqrtFracString(radic, rightFrac[0], i, rightFrac[1]),
				connect(withImaginary(-rightFracNum, imaginary), withImaginary(rightFracNum, imaginary))
			)
		}
	}

	document.body.appendChild(results)
}
update()
globalThis["solve"]()
function addChildList(element, ...texts) {
	for (const text of texts)
		if (text !== null || text !== "") {
			var li = document.createElement("li")
			element.appendChild(li)
			li.innerHTML = text
		}
}
function connect(...texts) {
	return texts.join('<span style="margin-inline:.5em">and</span>')
}
		</script>
	</body>
</html>
